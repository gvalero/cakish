name: Deploy Stripe Worker

on:
  push:
    branches: [dev, main]
    paths:
      - "worker/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          workingDirectory: worker
        # Worker secrets (STRIPE_SECRET_KEY, NOTIFY_EMAIL, WHATSAPP_PHONE)
        # are managed via the Cloudflare dashboard or `wrangler secret put`.
        # They persist across deploys and don't need to be re-pushed here.
